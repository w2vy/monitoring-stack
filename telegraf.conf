# Telegraf Configuration — Molten Tech Monitoring

[agent]
  interval = "30s"
  round_interval = true
  flush_interval = "10s"

# InfluxDB v2 Output
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "${INFLUX_TOKEN}"
  organization = "moltentech"
  bucket = "monitoring"

# === NUT UPS Monitoring via exec plugin ===
# Each command calls upsc via nut_collect.sh: <host> <port> <ups_name> <host_tag>

# mtm3 — GPU rig
[[inputs.exec]]
  commands = ["/usr/local/bin/nut_collect.sh 192.168.2.53 3493 apc mtm3"]
  timeout = "10s"
  data_format = "influx"

